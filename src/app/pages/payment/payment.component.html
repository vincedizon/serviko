<div class="payment-layout">
  <div class="payment-card" *ngIf="!paymentDone()">
    <div class="payment-header">
      <h1>Secure Payment</h1>
      <p>Choose your preferred payment method to confirm your booking.</p>
    </div>

    <div class="method-grid">
      <button type="button" 
              class="method-tile" 
              [class.active]="payMethod() === 'gcash'" 
              (click)="setMethod('gcash')">
        <span class="icon">💙</span>
        <span class="name">GCash</span>
      </button>
      
      <button type="button" 
              class="method-tile" 
              [class.active]="payMethod() === 'maya'" 
              (click)="setMethod('maya')">
        <span class="icon">💚</span>
        <span class="name">Maya</span>
      </button>
      
      <button type="button" 
              class="method-tile" 
              [class.active]="payMethod() === 'bank'" 
              (click)="setMethod('bank')">
        <span class="icon">🏦</span>
        <span class="name">Bank</span>
      </button>
    </div>

    <div class="payment-details-form slide-down">
      <div class="input-group" *ngIf="payMethod() === 'gcash'">
        <label>GCASH Mobile Number</label>
        <input type="tel" class="input-field" [(ngModel)]="gcashNum">
      </div>

      <div class="input-group" *ngIf="payMethod() === 'maya'">
        <label>MAYA Mobile Number</label>
        <input type="tel" class="input-field" [(ngModel)]="mayaNum">
      </div>

      <div class="input-group" *ngIf="payMethod() === 'bank'">
        <label>Select Your Bank</label>
        <select class="input-field" [(ngModel)]="selectedBank">
          <option *ngFor="let b of banks" [value]="b">{{ b }}</option>
        </select>
      </div>
    </div>

    <div class="order-summary">
      <div class="summary-line">
        <span>Service Total</span>
        <span>₱{{ totalAmount }}</span>
      </div>
      <div class="summary-line total">
        <span>Amount to Pay</span>
        <span>₱{{ totalAmount }}</span>
      </div>
    </div>

    <div class="error-msg" *ngIf="errorMsg()">
      <span>⚠️ {{ errorMsg() }}</span>
    </div>

    <button class="btn-pay" 
            [disabled]="loading()" 
            (click)="processPayment()">
      <span *ngIf="!loading()">Pay ₱{{ totalAmount }}</span>
      <span *ngIf="loading()" class="loader"></span>
    </button>
  </div>

  <div class="success-card" *ngIf="paymentDone()" @checkAnim>
    <div class="confetti-placeholder"></div>
    <div class="success-icon">✓</div>
    <h2>Booking Confirmed!</h2>
    <p>We've sent the details to your email.</p>
    <button class="btn-primary" (click)="go('/bookings')">Go to My Bookings</button>
  </div>
</div>
